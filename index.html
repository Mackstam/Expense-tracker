<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macks Expense Tracker</title>
<style>
body { font-family: Arial; background:#0b1a2b; color:white; padding:16px; }
.card { background:#13263d; padding:12px; border-radius:12px; margin-bottom:10px; }
button { padding:6px 10px; border-radius:8px; border:none; }
</style>
</head>
<body>

<h2>Macks Expense Tracker</h2>
<div id="version">v9.0.2</div>

<script>
// ================= STATE =================
let state = {
  entries: [],
  recurringRules: [],
  settings: {
    balanceAnchor: {
      enabled: false,
      date: '',
      amountCad: 0,
      includeRepayments: true
    }
  }
};

// ================= HELPERS =================
function todayStr(){
  return new Date().toISOString().split('T')[0];
}

function compareDate(a,b){
  return new Date(a) - new Date(b);
}

// ================= FIX 1: PRESERVE PAID =================
function syncRuleSplitToEntry(rule, entry){
  const oldSplits = entry.splits || [];

  entry.splits = (rule.splitsTemplate||[]).map(t=>{
    const old = oldSplits.find(os => os.person === t.person);
    const merged = old ? {...old, ...t} : {...t};

    if(merged.mode === 'charge'){
      merged.history = old?.history || [];

      if(old?.repaid || merged.history.length){
        merged.repaid = true;
        merged.remainingCad = 0;
      } else {
        merged.repaid = false;
        merged.remainingCad = merged.amountCad;
      }
    }

    return merged;
  });
}

// ================= FIX 2: STOP RESET =================
function ensureRecurringEntriesToToday(){
  const today = todayStr();

  for(const rule of state.recurringRules){
    const date = today;

    let existing = state.entries.find(e =>
      e.recurringRuleId === rule.id &&
      e.date === date
    );

    if(!existing){
      const manualMatch = state.entries.find(e =>
        !e.recurringRuleId &&
        e.date === date &&
        e.title === rule.title
      );

      if(manualMatch){
        manualMatch.recurringRuleId = rule.id;
        existing = manualMatch;
      }
    }

    if(!existing){
      state.entries.push({
        id: Date.now(),
        date,
        title: rule.title,
        amountCad: rule.amountCad,
        type: rule.type,
        recurringRuleId: rule.id,
        splits: []
      });
    }
  }
}

// ================= FIX 3: BALANCE =================
function computeBalance(){
  const anchor = state.settings.balanceAnchor;
  let balance = anchor.amountCad;

  for(const e of state.entries){
    if(anchor.enabled && e.date < anchor.date) continue;

    const isRepayment =
      (e.title||'').includes('repaid');

    if(e.type === 'income'){
      if(!anchor.includeRepayments && isRepayment) continue;
      balance += e.amountCad;
    } else {
      balance -= e.amountCad;
    }
  }

  return balance;
}

// demo UI
document.body.innerHTML += "<div class='card'>Balance: $" + computeBalance().toFixed(2) + "</div>";

</script>

</body>
</html>
